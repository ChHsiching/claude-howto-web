name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
          ref: develop

      - name: Check upstream changes
        id: check
        run: |
          cd upstream
          git fetch origin
          UPSTREAM_HEAD=$(git rev-parse origin/main 2>/dev/null || git rev-parse origin/master)
          LAST_COMMIT_FILE="../.claude/last-upstream-commit.txt"
          if [[ -f "$LAST_COMMIT_FILE" ]]; then
            LAST_COMMIT=$(cat "$LAST_COMMIT_FILE")
            if [[ "$UPSTREAM_HEAD" == "$LAST_COMMIT" ]]; then
              echo "No upstream changes"
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "Upstream changes detected"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git checkout "$UPSTREAM_HEAD"
          mkdir -p ../.claude
          echo "$UPSTREAM_HEAD" > "$LAST_COMMIT_FILE"

      - name: Setup Node
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Sync and build
        if: steps.check.outputs.has_changes == 'true'
        run: npm ci && npm run docs:build

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "ChHsiching"
          git config user.email "hsichingchang@gmail.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: sync upstream content"
          git push origin develop

      - name: Merge to main
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git checkout main
          git merge --no-ff develop -m "release: auto-sync upstream"
          git push origin main

      - name: Trigger Deploy
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            })
